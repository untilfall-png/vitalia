<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Iniciar sesión — VitalIA</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🩺</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0f1e;
      --bg2:     #0f172a;
      --bg3:     #1e293b;
      --primary: #0ea5e9;
      --primary-d: #0284c7;
      --accent:  #8b5cf6;
      --text:    #f1f5f9;
      --text2:   #94a3b8;
      --border:  rgba(255,255,255,0.08);
      --danger:  #ef4444;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(14,165,233,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(139,92,246,0.10) 0%, transparent 50%);
    }
    .card {
      position: relative; z-index: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px; text-decoration: none;
    }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(14,165,233,0.3);
    }
    .logo-text {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 22px; font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 24px; font-weight: 700;
      margin-bottom: 6px;
    }
    .subtitle {
      color: var(--text2); font-size: 14px; margin-bottom: 28px;
    }
    .field { margin-bottom: 16px; }
    label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text2); margin-bottom: 6px;
    }
    input {
      width: 100%; padding: 11px 14px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 15px;
      outline: none; transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
    }
    input::placeholder { color: var(--text2); }
    .btn-primary {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--primary-d));
      color: #fff; border: none; border-radius: 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all .2s;
      box-shadow: 0 0 20px rgba(14,165,233,0.3);
      margin-top: 8px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 32px rgba(14,165,233,0.5); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5; padding: 10px 14px; border-radius: 10px;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .divider { text-align: center; margin: 20px 0; color: var(--text2); font-size: 13px; position: relative; }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%; width: 40%; height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .link-row { text-align: center; font-size: 14px; color: var(--text2); }
    .link-row a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .link-row a:hover { text-decoration: underline; }
    .forgot-box {
      display: none; margin-top: 14px;
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.3);
      border-radius: 12px; padding: 14px 16px; text-align: center;
    }
    .forgot-box p { font-size: 13px; color: #fbbf24; margin-bottom: 10px; line-height: 1.5; }
    .btn-forgot {
      display: inline-block; padding: 9px 22px;
      background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.4);
      color: #fbbf24; border-radius: 10px; font-size: 13px; font-weight: 600;
      text-decoration: none; cursor: pointer; transition: all .2s;
    }
    .btn-forgot:hover { background: rgba(245,158,11,0.25); }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <a href="/" class="logo">
      <div class="logo-icon">🩺</div>
      <span class="logo-text">VitalIA</span>
    </a>

    <h1>Bienvenido de vuelta</h1>
    <p class="subtitle">Accede a tu historial médico personal.</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email"/>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-primary" id="btnSubmit">Iniciar sesión</button>
    </form>

    <div class="forgot-box" id="forgotBox">
      <p>🔐 Demasiados intentos fallidos. ¿Olvidaste tu contraseña?</p>
      <a href="/forgot-password" class="btn-forgot">Recuperar contraseña</a>
    </div>

    <div class="divider">o</div>
    <p class="link-row">
      ¿No tienes cuenta? <a href="/register">Crear cuenta gratis</a>
    </p>
    <p class="link-row" style="margin-top:14px;font-size:12px;">
      <a href="/terminos" target="_blank" style="color:var(--text2);font-weight:400;">Consentimiento informado y términos de uso</a>
    </p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn    = document.getElementById('btnSubmit');
      const errDiv = document.getElementById('errorMsg');
      errDiv.style.display = 'none';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Entrando...';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = data.redirect || '/app';
        } else {
          errDiv.textContent = data.error || 'Error al iniciar sesión';
          errDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Iniciar sesión';
          if ((data.intentos || 0) >= 3) {
            document.getElementById('forgotBox').style.display = 'block';
          }
        }
      } catch {
        errDiv.textContent = 'Error de conexión. Intenta de nuevo.';
        errDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    });
  </script>
</body>
</html>
